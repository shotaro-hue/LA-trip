name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Update static assets for branch-deploy fallback
        run: |
          ASSET=$(ls dist/assets/*.js | head -1 | xargs basename)
          cp "dist/assets/$ASSET" "assets/$ASSET"
          python3 - "$ASSET" <<'EOF'
import re, sys
asset = sys.argv[1]
with open('index.html') as f:
    html = f.read()
html = re.sub(
    r'<script\b[^>]*></script>',
    '<script type="module" crossorigin src="/LA-trip/assets/' + asset + '"></script>',
    html
)
with open('index.html', 'w') as f:
    f.write(html)
EOF
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          git add "assets/$ASSET" index.html
          git diff --staged --quiet || git commit -m "chore: update built assets [skip ci]" && git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
